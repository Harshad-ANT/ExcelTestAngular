<div class="doc-list-container">
  <header class="doc-header">
    <h1>Spreadsheet Documents</h1>
    <div class="create-form">
      <input
        type="text"
        placeholder="Document name..."
        [ngModel]="newDocName()"
        (ngModelChange)="newDocName.set($event)"
        (keydown.enter)="createDocument()"
      />
      <button class="btn-create" (click)="createDocument()">+ New Document</button>
    </div>
  </header>

  @if (documents().length === 0) {
    <div class="empty-state">
      <p>No documents yet. Create your first spreadsheet!</p>
    </div>
  } @else {
    <div class="doc-grid">
      @for (doc of documents(); track doc.id) {
        <div class="doc-card" (click)="openDocument(doc.id)">
          <div class="doc-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="6" y="4" width="36" height="40" rx="3" fill="#34a853" opacity="0.15" stroke="#34a853" stroke-width="2"/>
              <line x1="14" y1="16" x2="34" y2="16" stroke="#34a853" stroke-width="2"/>
              <line x1="14" y1="24" x2="34" y2="24" stroke="#34a853" stroke-width="2"/>
              <line x1="14" y1="32" x2="28" y2="32" stroke="#34a853" stroke-width="2"/>
              <line x1="24" y1="12" x2="24" y2="36" stroke="#34a853" stroke-width="1.5" opacity="0.5"/>
            </svg>
          </div>
          <div class="doc-info">
            <h3>{{ doc.name }}</h3>
            <span class="doc-date">Modified {{ doc.updatedAt | date:'medium' }}</span>
          </div>
          <button class="btn-delete" (click)="deleteDocument($event, doc.id)" title="Delete">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      }
    </div>
  }
</div>
